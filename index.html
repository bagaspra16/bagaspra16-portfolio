<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/img/mylogo.png">
    <title>Bagas | Preload</title>
    <style>
        body {
            background-color: #161424;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            opacity: 1; /* Start with opacity 1 to allow fade-out effect */
            transition: opacity 0.5s ease-in-out; /* Fade-out transition */
        }
        .preload-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 1;
            transition: opacity 0.5s ease-in-out; /* Fade-out transition */
            max-width: 90%; /* Limit maximum width */
            padding: 20px; /* Add padding for content */
            text-align: center; /* Center align content */
        }
        .preload-content.hidden {
            opacity: 0; /* Hide the preload content when it's not needed */
            pointer-events: none; /* Disable pointer events */
        }
         /* Media query for smaller screens (e.g., mobile phones) */
         @media (max-width: 768px) {
            .preload-content {
                max-width: 80%; /* Adjust max-width for smaller screens */
            }
        }
    </style>
</head>
<body>
    <div class="preload-content">
        <dotlottie-player src="https://lottie.host/c0fa01ea-4c01-4a46-aafb-86ab003548d8/Pg70fttTXo.json" background="transparent" speed="2" style="width: 200px; height: 200px;" class="load" loop autoplay></dotlottie-player>
        <!--<h3 style="text-align: center; font-family: Poppins, sans-serif; font-weight: 820; color: white;">Loading...</h3>-->
    </div>
    
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script>
        // Simulate some loading time
        setTimeout(() => {
            document.querySelector('.preload-content').classList.add('hidden');
            setTimeout(() => {
                document.body.style.opacity = 0; // Start fading out the whole body
                setTimeout(() => {
                    window.location.href = 'main.html'; // Redirect to your main page
                }, 500); // Wait for 0.5s before redirecting
            }, 500); // Wait for 0.5s after hiding preload content
        }, 3000); // Simulate 3 seconds of loading time
    </script>
</body>
</html>
